<!DOCTYPE html>

<title>/*[|template_title|]*/0</title>

<style>
:root {
  --bg: #fbf6ee;
  --bg-deep: #f3ebda;
  --bg-card: #fdf9f1;
  --ink: #2d2620;
  --ink-soft: #6b5d50;
  --ink-faint: #a39684;
  --peach: #e29a78;
  --peach-deep: #c97961;
  --peach-soft: #f4c8b1;
  --sage: #9bab8b;
  --sage-deep: #7c8e6d;
  --butter: #e9c878;
  --rule: rgba(45, 38, 32, 0.14);
  --rule-soft: rgba(45, 38, 32, 0.08);
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: 'Manrope', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(circle at 18% 12%, rgba(226, 154, 120, 0.14) 0%, transparent 38%),
    radial-gradient(circle at 88% 86%, rgba(155, 171, 139, 0.14) 0%, transparent 42%),
    radial-gradient(circle at 65% 30%, rgba(233, 200, 120, 0.08) 0%, transparent 36%),
    var(--bg);
}

.gate-shell {
  flex: 1;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: clamp(1.4rem, 4vw, 4rem);
  gap: clamp(1.2rem, 2.4vw, 2rem);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Manrope', sans-serif;
  font-size: clamp(0.78rem, 1.05vw, 1rem);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--ink-soft);
  padding-bottom: clamp(0.6rem, 1.2vw, 1rem);
  border-bottom: 1px solid var(--rule-soft);
}
.top .left {
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
}
.top .left .dot {
  width: 0.5em; height: 0.5em;
  border-radius: 50%;
  background: var(--peach);
  display: inline-block;
}
.top .issue {
  color: var(--ink-faint);
  letter-spacing: 0.22em;
}

.hero {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}
.gate-card {
  width: 100%;
  max-width: 540px;
  background: var(--bg-card);
  border: 1.5px solid var(--rule-soft);
  border-radius: clamp(0.8rem, 1.4vw, 1.2rem);
  padding: clamp(2rem, 4vw, 3.4rem);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.6) inset,
    0 30px 60px -20px rgba(45, 38, 32, 0.20);
  position: relative;
  overflow: hidden;
}
.gate-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 4px;
  background: var(--peach);
}
.gate-card::after {
  content: "";
  position: absolute;
  top: 0; right: 0;
  width: clamp(4rem, 7vw, 6rem);
  height: clamp(4rem, 7vw, 6rem);
  background: radial-gradient(circle, rgba(226, 154, 120, 0.18), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.kicker {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: clamp(0.85rem, 1.1vw, 1.05rem);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--peach-deep);
  display: inline-flex;
  align-items: center;
  gap: 0.7em;
  margin-bottom: clamp(0.8rem, 1.4vw, 1.2rem);
}
.kicker::before {
  content: "";
  width: clamp(1.6rem, 2.4vw, 2.4rem);
  height: 1.5px;
  background: var(--peach-deep);
  display: inline-block;
}

.gate-title {
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "opsz" 144, "SOFT" 60;
  font-weight: 400;
  font-size: clamp(2rem, 4.8vw, 3.4rem);
  line-height: 1.0;
  letter-spacing: -0.018em;
  color: var(--ink);
  margin: 0 0 clamp(0.7rem, 1.3vw, 1.1rem);
}
.gate-title em {
  font-style: italic;
  color: var(--peach-deep);
  font-variation-settings: "opsz" 144, "SOFT" 100;
  font-weight: 400;
  position: relative;
}
.gate-title .sparkle {
  color: var(--sage);
  font-size: 0.4em;
  margin-left: 0.1em;
  vertical-align: super;
  animation: tw 3.6s ease-in-out infinite;
  display: inline-block;
}

.gate-sub {
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "opsz" 36, "SOFT" 30;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1.05rem, 1.55vw, 1.3rem);
  line-height: 1.4;
  color: var(--ink-soft);
  margin: 0 0 clamp(1.5rem, 2.4vw, 2rem);
  max-width: 38ch;
}

.staticrypt-instructions, .staticrypt-title, .staticrypt-hr { display: none; }

#staticrypt-form {
  display: flex;
  flex-direction: column;
  gap: clamp(0.8rem, 1.4vw, 1.2rem);
}
.staticrypt-password-container {
  position: relative;
  display: flex;
  align-items: center;
}
#staticrypt-password {
  flex: 1;
  width: 100%;
  background: rgba(255, 255, 255, 0.6);
  border: 1.5px solid var(--rule);
  border-radius: clamp(0.5rem, 0.9vw, 0.7rem);
  padding: clamp(0.8rem, 1.4vw, 1.1rem) clamp(2.6rem, 4vw, 3.2rem) clamp(0.8rem, 1.4vw, 1.1rem) clamp(1rem, 1.6vw, 1.3rem);
  font-family: 'Manrope', sans-serif;
  font-size: clamp(1rem, 1.4vw, 1.2rem);
  color: var(--ink);
  letter-spacing: 0.05em;
  outline: none;
  transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}
#staticrypt-password::placeholder {
  color: var(--ink-faint);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.85em;
  font-weight: 600;
}
#staticrypt-password:focus {
  border-color: var(--peach-deep);
  background: rgba(255, 255, 255, 0.85);
  box-shadow: 0 0 0 3px rgba(226, 154, 120, 0.20);
}
.staticrypt-toggle-password-visibility {
  position: absolute;
  right: clamp(0.6rem, 1.1vw, 0.95rem);
  top: 50%;
  transform: translateY(-50%);
  width: 1.2em;
  height: 1.2em;
  cursor: pointer;
  filter: brightness(0.4);
  opacity: 0.55;
  transition: opacity 0.2s ease;
}
.staticrypt-toggle-password-visibility:hover { opacity: 0.95; }

.staticrypt-decrypt-button {
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 999px;
  padding: clamp(0.85rem, 1.4vw, 1.15rem) clamp(1.4rem, 2.4vw, 2rem);
  font-family: 'Manrope', sans-serif;
  font-size: clamp(0.95rem, 1.3vw, 1.15rem);
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  box-shadow: 0 12px 24px -10px rgba(45, 38, 32, 0.4);
}
.staticrypt-decrypt-button:hover {
  background: var(--peach-deep);
  transform: translateY(-2px);
  box-shadow: 0 16px 28px -10px rgba(45, 38, 32, 0.5);
}

#staticrypt-remember-label {
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
  font-family: 'Manrope', sans-serif;
  font-size: clamp(0.85rem, 1.15vw, 1.05rem);
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  cursor: pointer;
  user-select: none;
}
#staticrypt-remember-label.hidden { display: none; }
#staticrypt-remember {
  width: 1.05em; height: 1.05em;
  accent-color: var(--peach-deep);
}

.staticrypt-error {
  margin: clamp(0.6rem, 1vw, 0.85rem) 0 0;
  padding: clamp(0.6rem, 1vw, 0.85rem) clamp(0.8rem, 1.3vw, 1.1rem);
  background: rgba(226, 154, 120, 0.14);
  border: 1px solid rgba(201, 121, 97, 0.5);
  border-radius: 6px;
  color: var(--peach-deep);
  font-family: 'Manrope', sans-serif;
  font-size: clamp(0.85rem, 1.15vw, 1.05rem);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-align: center;
}
.shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
@keyframes shake {
  10%, 90% { transform: translateX(-1px); }
  20%, 80% { transform: translateX(2px); }
  30%, 50%, 70% { transform: translateX(-4px); }
  40%, 60% { transform: translateX(4px); }
}

#staticrypt_loading {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  z-index: 1000;
}
#staticrypt_loading.hidden { display: none; }
.staticrypt-spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(226, 154, 120, 0.20);
  border-top-color: var(--peach-deep);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#staticrypt_content.hidden { display: none; }
.hidden { display: none; }

.foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Manrope', sans-serif;
  font-size: clamp(0.78rem, 1.05vw, 1rem);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
  font-weight: 500;
  padding-top: clamp(0.6rem, 1.2vw, 1rem);
  border-top: 1px solid var(--rule-soft);
}

.sparkle-deco {
  position: fixed;
  font-family: 'Fraunces', serif;
  pointer-events: none;
  z-index: 1;
}
.sparkle-deco.s1 { top: 14%; left: 8%; color: var(--sage); font-size: clamp(0.9rem, 1.4vw, 1.2rem); animation: tw 4.5s ease-in-out infinite; }
.sparkle-deco.s2 { top: 22%; right: 10%; color: var(--peach); font-size: clamp(0.7rem, 1.1vw, 0.95rem); animation: tw 5s ease-in-out infinite 0.6s; }
.sparkle-deco.s3 { bottom: 26%; left: 12%; color: var(--peach-deep); font-size: clamp(0.85rem, 1.3vw, 1.1rem); animation: tw 4.2s ease-in-out infinite 1.2s; }
.sparkle-deco.s4 { bottom: 18%; right: 9%; color: var(--sage-deep); font-size: clamp(0.7rem, 1vw, 0.9rem); animation: tw 5.5s ease-in-out infinite 0.3s; }
@keyframes tw { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.18); } }

@media (max-width: 600px) {
  .top { font-size: 0.7rem; }
  .top .issue { font-size: 0.65rem; }
  .foot { flex-direction: column; gap: 0.4rem; text-align: center; }
}
</style>
</head>

<body class="staticrypt-body">

<span class="sparkle-deco s1">✦</span>
<span class="sparkle-deco s2">✦</span>

<div id="staticrypt_loading">
  <div class="staticrypt-spinner"></div>
</div>

<div id="staticrypt_content" class="hidden">
  <div class="gate-shell">

    <div class="top">
      <span class="left"><span class="dot"></span>Tutoring with Mr Igor</span>
      <span class="issue">Monthly Recap</span>
    </div>

    <div class="hero">
      <div class="gate-card">
        <div class="kicker">Confidential · Tutoring Recap</div>
        <h1 class="gate-title">Monthly <em>Tutoring</em><span class="sparkle">✦</span></h1>
        <p class="gate-sub">Enter the access password to view this recap.</p>

        <div class="staticrypt-instructions">
          <p class="staticrypt-title">/*[|template_title|]*/0</p>
          <p>/*[|template_instructions|]*/0</p>
        </div>
        <hr class="staticrypt-hr">

        <form id="staticrypt-form" action="#" method="post">
          <div class="staticrypt-password-container">
            <input
              id="staticrypt-password"
              type="password"
              name="password"
              placeholder="/*[|template_placeholder|]*/0"
              autofocus
            />
            <img
              class="staticrypt-toggle-password-visibility"
              alt="/*[|template_toggle_show|]*/0"
              title="/*[|template_toggle_show|]*/0"
              src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1NzYgNTEyIj48cGF0aCBmaWxsPSJjdXJyZW50Q29sb3IiIGQ9Ik0yODggMzJjLTgwLjggMC0xNDUuNSAzNi44LTE5Mi42IDgwLjZDNDguNiAxNTYgMTcuMyAyMDggMi41IDI0My43Yy0zLjMgNy45LTMuMyAxNi43IDAgMjQuNkMxNy4zIDMwNCA0OC42IDM1NiA5NS40IDM5OS40QzE0Mi41IDQ0My4yIDIwNy4yIDQ4MCAyODggNDgwczE0NS41LTM2LjggMTkyLjYtODAuNmM0Ni44LTQzLjUgNzguMS05NS40IDkzLTEzMS4xYzMuMy03LjkgMy4zLTE2LjcgMC0yNC42Yy0xNC45LTM1LjctNDYuMi04Ny43LTkzLTEzMS4xQzQzMy41IDY4LjggMzY4LjggMzIgMjg4IDMyek0xNDQgMjU2YTE0NCAxNDQgMCAxIDEgMjg4IDAgMTQ0IDE0NCAwIDEgMS0yODggMHptMTQ0LTY0YzAgMzUuMy0yOC43IDY0LTY0IDY0Yy03LjEgMC0xMy45LTEuMi0yMC4zLTMuM2MtNS41LTEuOC0xMS45IDEuNi0xMS43IDcuNGMuMyA2LjcgMS4zIDEzLjMgMy4zIDIwYzE0LjEgNDcuMyA2NC45IDc0LjMgMTEyLjMgNjAuMnM3NC4zLTY0LjkgNjAuMi0xMTIuM2MtMTEuNy0zOS41LTQ4LTY1LjctODguMS02NC45Yy01LjcgLjEtOSA2LjMtNyAxMS43YzIuMSA2LjUgMy4zIDEzLjUgMy4zIDIwLjJ6Ii8+PC9zdmc+"

  </div>

<script>
  const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
  const templateError = "/*[|template_error|]*/0",
        templateToggleAltShow = "/*[|template_toggle_show|]*/0",
        templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
        isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
        staticryptConfig = /*[|staticrypt_config|]*/ 0;

  const templateConfig = {
    rememberExpirationKey: "staticrypt_expiration",
    rememberPassphraseKey: "staticrypt_passphrase",
    replaceHtmlCallback: null,
    clearLocalStorageCallback: null,
  };

  const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

  window.onload = async function () {
    const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
    if (!isSuccessful) {
      document.getElementById("staticrypt_loading").classList.add("hidden");
      document.getElementById("staticrypt_content").classList.remove("hidden");
      document.getElementById("staticrypt-password").focus();
      if (isRememberEnabled) {
        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
      }
    }
  };

  document.querySelector(".staticrypt-toggle-password-visibility").addEventListener("click", function () {
    const passwordInput = document.getElementById("staticrypt-password");
    if (passwordInput.type === "password") {
      passwordInput.type = "text";
      this.alt = templateToggleAltHide;
      this.title = templateToggleAltHide;
    } else {
      passwordInput.type = "password";
      this.alt = templateToggleAltShow;
      this.title = templateToggleAltShow;
    }
  });

  document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    const password = document.getElementById("staticrypt-password").value;
    const isRemembered = document.getElementById("staticrypt-remember").checked;
    const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRemembered);
    if (!isSuccessful) {
      const card = document.querySelector(".gate-card");
      card.classList.remove("shake");
      void card.offsetWidth;
      card.classList.add("shake");

      let err = document.getElementById("gate-error");
      if (!err) {
        err = document.createElement("div");
        err.id = "gate-error";
        err.className = "staticrypt-error";
        document.getElementById("staticrypt-form").appendChild(err);
      }
      err.textContent = templateError;
    }
  });
</script>
